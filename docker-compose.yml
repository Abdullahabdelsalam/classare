version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/classare
      - DB_USER=root
      - DB_PASSWORD=password
    depends_on:
      - db
    networks:
      - classare-network

  db:
    image: mysql:8.3
    environment:
      MYSQL_DATABASE: classare
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: classare_user
      MYSQL_PASSWORD: classare_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - classare-network

volumes:
  mysql_data:

networks:
  classare-network:
    driver: bridge